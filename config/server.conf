# cacheserver configuration
# Lines starting with # are comments

# Network
host = 0.0.0.0
port = 6399
backlog = 1024

# Worker threads (I/O-bound work; tune to 2x CPU cores for Redis-like workloads)
worker_threads = 4

# Storage
max_keys = 1000000

# Persistence
rdb_enabled = true
rdb_path = dump.rdb
rdb_interval_secs = 300

aof_enabled = false
aof_path = appendonly.aof

# Metrics HTTP endpoint (Prometheus scrape target at /metrics)
metrics_enabled = true
metrics_port = 9999

# Logging: trace | debug | info | warn | error | critical
log_level = info
log_file =

# Background expiry sweep interval in milliseconds
sweep_interval_ms = 1000
